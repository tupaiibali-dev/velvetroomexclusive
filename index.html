<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Room Exclusive</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #050510;
            /* Эффект глубокого синего бархата с неоновым свечением */
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 20, 95, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 212, 255, 0.1) 0px, transparent 50%),
                radial-gradient(circle at 50% 50%, #090a1a 0%, #020205 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00f0ff;
            overflow: hidden;
            position: relative;
        }
        /* Тонкая футуристичная сетка на фоне, отличающая этот дизайн */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            top: -50%;
            left: -50%;
            transform: rotate(15deg);
            z-index: 1;
        }
        .container {
            text-align: center;
            z-index: 2;
            padding: 30px;
            width: 100%;
            max-width: 440px;
            background: rgba(5, 5, 15, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .logo-area {
            margin-bottom: 50px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6), 0 0 20px rgba(0, 240, 255, 0.3);
        }
        /* Кнопка нового типа: прозрачная кибер-капсула со свечением */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 20px;
            font-size: 14px;
            font-weight: bold;
            color: #00f0ff;
            text-decoration: none;
            background: transparent;
            border: 2px solid #00f0ff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .btn:hover {
            background: #00f0ff;
            color: #050510;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <div class="logo-text">Velvet Room Exclusive</div>
        </div>
        <!-- Название кнопки: UNLOCK ACCESS (концептуальный кибер-стиль) -->
        <a href="https://t.me/+BYweaPdS-qhlNmMy" class="btn">UNLOCK ACCESS</a>
    </div>

</body>
</html>
